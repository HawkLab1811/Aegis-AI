<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B52026;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B52026;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="url(#shieldGrad)" stroke-width="2"/>
  
  <!-- Shield shape - minimalist -->
  <path d="M100 30 L155 55 L155 105 C155 140 130 165 100 175 C70 165 45 140 45 105 L45 55 Z" 
        fill="none" stroke="url(#shieldGrad)" stroke-width="3" filter="url(#softGlow)"/>
  
  <!-- Inner shield -->
  <path d="M100 45 L140 65 L140 100 C140 125 120 145 100 152 C80 145 60 125 60 100 L60 65 Z" 
        fill="url(#shieldGrad)" opacity="0.15"/>
  
  <!-- AI Neural node pattern -->
  <g filter="url(#glow)">
    <!-- Central node -->
    <circle cx="100" cy="95" r="10" fill="url(#nodeGrad)"/>
    
    <!-- Connection lines -->
    <line x1="100" y1="105" x2="100" y2="130" stroke="#EC0000" stroke-width="2"/>
    <line x1="100" y1="85" x2="100" y2="60" stroke="#EC0000" stroke-width="2"/>
    <line x1="110" y1="95" x2="135" y2="95" stroke="#EC0000" stroke-width="2"/>
    <line x1="90" y1="95" x2="65" y2="95" stroke="#EC0000" stroke-width="2"/>
    
    <!-- Diagonal connections -->
    <line x1="107" y1="88" x2="125" y2="70" stroke="#EC0000" stroke-width="1.5" opacity="0.7"/>
    <line x1="93" y1="88" x2="75" y2="70" stroke="#EC0000" stroke-width="1.5" opacity="0.7"/>
    <line x1="107" y1="102" x2="125" y2="120" stroke="#EC0000" stroke-width="1.5" opacity="0.7"/>
    <line x1="93" y1="102" x2="75" y2="120" stroke="#EC0000" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Outer nodes -->
    <circle cx="100" cy="130" r="5" fill="#B52026"/>
    <circle cx="100" cy="60" r="5" fill="#B52026"/>
    <circle cx="135" cy="95" r="5" fill="#B52026"/>
    <circle cx="65" cy="95" r="5" fill="#B52026"/>
    
    <!-- Corner nodes -->
    <circle cx="125" cy="70" r="3" fill="#EC0000" opacity="0.8"/>
    <circle cx="75" cy="70" r="3" fill="#EC0000" opacity="0.8"/>
    <circle cx="125" cy="120" r="3" fill="#EC0000" opacity="0.8"/>
    <circle cx="75" cy="120" r="3" fill="#EC0000" opacity="0.8"/>
  </g>
  
  <!-- Brand text -->
  <text x="100" y="172" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" 
        fill="#EC0000" text-anchor="middle" letter-spacing="3">AEGIS</text>
</svg>
