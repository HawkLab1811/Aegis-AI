<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B52026;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0a0a" stroke="url(#shieldGradient)" stroke-width="2"/>
  
  <!-- Shield shape -->
  <path d="M100 25 L160 55 L160 110 C160 145 130 175 100 185 C70 175 40 145 40 110 L40 55 Z" 
        fill="url(#shieldGradient)" filter="url(#glow)"/>
  
  <!-- Inner shield highlight -->
  <path d="M100 35 L150 60 L150 108 C150 138 125 163 100 172 C75 163 50 138 50 108 L50 60 Z" 
        fill="url(#innerGlow)"/>
  
  <!-- AI Circuit pattern -->
  <g stroke="#EC0000" stroke-width="2" fill="none" opacity="0.8">
    <!-- Central node -->
    <circle cx="100" cy="95" r="8" fill="#EC0000"/>
    
    <!-- Circuit lines -->
    <line x1="100" y1="103" x2="100" y2="130"/>
    <line x1="100" y1="87" x2="100" y2="65"/>
    <line x1="108" y1="95" x2="130" y2="95"/>
    <line x1="92" y1="95" x2="70" y2="95"/>
    
    <!-- Diagonal lines -->
    <line x1="106" y1="89" x2="120" y2="75"/>
    <line x1="94" y1="89" x2="80" y2="75"/>
    <line x1="106" y1="101" x2="120" y2="115"/>
    <line x1="94" y1="101" x2="80" y2="115"/>
    
    <!-- Endpoint nodes -->
    <circle cx="100" cy="130" r="4" fill="#EC0000"/>
    <circle cx="100" cy="65" r="4" fill="#EC0000"/>
    <circle cx="130" cy="95" r="4" fill="#EC0000"/>
    <circle cx="70" cy="95" r="4" fill="#EC0000"/>
    <circle cx="120" cy="75" r="4" fill="#EC0000"/>
    <circle cx="80" cy="75" r="4" fill="#EC0000"/>
    <circle cx="120" cy="115" r="4" fill="#EC0000"/>
    <circle cx="80" cy="115" r="4" fill="#EC0000"/>
  </g>
  
  <!-- Text: AEGIS -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#EC0000" text-anchor="middle" letter-spacing="4">AEGIS</text>
</svg>
